<style>
    .nofont {
        /* TODO use variable for default non-custom font */
        font-family: 'Noto Sans Mono' !important;
    }

    .font {
        font-family: var(--font-selected);
    }

    .alphabet {
        font-size: 40px !important;
        line-height: 1.25em !important;
    }
</style>

<!-- TODO this is specific to block font do some special magic to show only with it -->
<p class="nofont" style="font-size: 16px">On the left is all characters in alphabetical order, on the right they are grouped by complexity and similarity</p>
<div style="display: flex; flex-wrap: nowrap; justify-content: center;">
    <div>
        <span class="auto">ABCD</span>
        <span class="auto">EFGH</span>
        <span class="auto">IJKL</span>
        <span class="auto">MNOP</span>
        <span class="auto">QRST</span>
        <span class="auto">UVWX</span>
        <span class="auto">YZ</span>

        <span class="auto">123</span>
        <span class="auto">456</span>
        <span class="auto">789</span>
        <span class="auto"> 0 </span>
    </div>

    <div>
        <span class="auto">AEOF</span>
        <span class="auto">TDG</span>
        <span class="auto">CVW</span>
        <span class="auto">RPS</span>
        <span class="auto">KUIJLHB</span>
        <span class="auto">MNQXYZ</span>
    </div>
</div>

<p>

<span>The five boxing wizards jump quickly.</span>

A B C D E F G H I J K L M N O P

</p>

<script type="text/javascript">
Array.from(document.getElementsByClassName("auto")).forEach(oldElem => {
    const characters = Array.from(oldElem.textContent);

    // clear the span
    oldElem.textContent = '';
    
    characters.forEach(ch => {
        let elemFont = document.createElement("span");
        elemFont.classList.add("font");
        elemFont.classList.add("alphabet");
        elemFont.textContent = " " + ch + " ";

        let elemNoFont = document.createElement("span");
        elemNoFont.classList.add("nofont");
        elemNoFont.classList.add("alphabet");
        elemNoFont.textContent = ch + " ";

        oldElem.appendChild(elemFont);
        oldElem.appendChild(elemNoFont);
    });
});
</script>
